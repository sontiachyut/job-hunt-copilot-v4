<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="900" viewBox="0 0 1400 900" role="img" aria-labelledby="title desc">
  <title id="title">Job Hunt Copilot v4 architecture overview</title>
  <desc id="desc">Layered architecture showing external systems, product runtime modules, durable state, and the runtime and build control planes.</desc>

  <rect width="1400" height="900" rx="28" fill="#F8FAFC"/>
  <rect x="32" y="32" width="1336" height="836" rx="24" fill="#FFFFFF" stroke="#E2E8F0" stroke-width="2"/>

  <text x="80" y="96" font-family="Arial, Helvetica, sans-serif" font-size="42" font-weight="700" fill="#0F172A">Architecture overview</text>
  <text x="80" y="134" font-family="Arial, Helvetica, sans-serif" font-size="22" fill="#475569">The runtime is split into explicit workflow modules, durable storage, and bounded control planes.</text>

  <rect x="80" y="176" width="1240" height="116" rx="24" fill="#EFF6FF" stroke="#BFDBFE" stroke-width="2"/>
  <text x="112" y="220" font-family="Arial, Helvetica, sans-serif" font-size="24" font-weight="700" fill="#1D4ED8">External systems</text>

  <rect x="112" y="236" width="212" height="36" rx="18" fill="#DBEAFE"/>
  <text x="153" y="260" font-family="Arial, Helvetica, sans-serif" font-size="18" font-weight="700" fill="#1E3A8A">Job sources</text>

  <rect x="350" y="236" width="212" height="36" rx="18" fill="#DBEAFE"/>
  <text x="416" y="260" font-family="Arial, Helvetica, sans-serif" font-size="18" font-weight="700" fill="#1E3A8A">Apollo</text>

  <rect x="588" y="236" width="212" height="36" rx="18" fill="#DBEAFE"/>
  <text x="663" y="260" font-family="Arial, Helvetica, sans-serif" font-size="18" font-weight="700" fill="#1E3A8A">Gmail</text>

  <rect x="826" y="236" width="212" height="36" rx="18" fill="#DBEAFE"/>
  <text x="876" y="260" font-family="Arial, Helvetica, sans-serif" font-size="18" font-weight="700" fill="#1E3A8A">People data providers</text>

  <rect x="1064" y="236" width="224" height="36" rx="18" fill="#DBEAFE"/>
  <text x="1122" y="260" font-family="Arial, Helvetica, sans-serif" font-size="18" font-weight="700" fill="#1E3A8A">Human review inputs</text>

  <rect x="80" y="330" width="1240" height="192" rx="24" fill="#F8FAFC" stroke="#E2E8F0" stroke-width="2"/>
  <text x="112" y="372" font-family="Arial, Helvetica, sans-serif" font-size="24" font-weight="700" fill="#0F172A">Product runtime</text>

  <rect x="112" y="408" width="210" height="88" rx="20" fill="#ECFDF5" stroke="#A7F3D0" stroke-width="2"/>
  <text x="145" y="445" font-family="Arial, Helvetica, sans-serif" font-size="20" font-weight="700" fill="#047857">Lead ingestion</text>
  <text x="145" y="474" font-family="Arial, Helvetica, sans-serif" font-size="17" fill="#334155">materialize leads and JDs</text>

  <rect x="346" y="408" width="210" height="88" rx="20" fill="#ECFDF5" stroke="#A7F3D0" stroke-width="2"/>
  <text x="379" y="445" font-family="Arial, Helvetica, sans-serif" font-size="20" font-weight="700" fill="#047857">Resume tailoring</text>
  <text x="379" y="474" font-family="Arial, Helvetica, sans-serif" font-size="17" fill="#334155">verify tailored resume output</text>

  <rect x="580" y="408" width="210" height="88" rx="20" fill="#ECFDF5" stroke="#A7F3D0" stroke-width="2"/>
  <text x="606" y="445" font-family="Arial, Helvetica, sans-serif" font-size="20" font-weight="700" fill="#047857">Contact discovery</text>
  <text x="606" y="474" font-family="Arial, Helvetica, sans-serif" font-size="17" fill="#334155">resolve people and emails</text>

  <rect x="814" y="408" width="210" height="88" rx="20" fill="#ECFDF5" stroke="#A7F3D0" stroke-width="2"/>
  <text x="859" y="445" font-family="Arial, Helvetica, sans-serif" font-size="20" font-weight="700" fill="#047857">Outreach engine</text>
  <text x="859" y="474" font-family="Arial, Helvetica, sans-serif" font-size="17" fill="#334155">draft, pace, and send emails</text>

  <rect x="1048" y="408" width="240" height="88" rx="20" fill="#ECFDF5" stroke="#A7F3D0" stroke-width="2"/>
  <text x="1082" y="445" font-family="Arial, Helvetica, sans-serif" font-size="20" font-weight="700" fill="#047857">Feedback and follow-ups</text>
  <text x="1082" y="474" font-family="Arial, Helvetica, sans-serif" font-size="17" fill="#334155">replies, bounces, next actions</text>

  <path d="M322 452 H346" stroke="#94A3B8" stroke-width="4" fill="none"/>
  <polygon points="346,452 332,444 332,460" fill="#94A3B8"/>
  <path d="M556 452 H580" stroke="#94A3B8" stroke-width="4" fill="none"/>
  <polygon points="580,452 566,444 566,460" fill="#94A3B8"/>
  <path d="M790 452 H814" stroke="#94A3B8" stroke-width="4" fill="none"/>
  <polygon points="814,452 800,444 800,460" fill="#94A3B8"/>
  <path d="M1024 452 H1048" stroke="#94A3B8" stroke-width="4" fill="none"/>
  <polygon points="1048,452 1034,444 1034,460" fill="#94A3B8"/>

  <rect x="80" y="560" width="800" height="248" rx="24" fill="#111827"/>
  <text x="112" y="604" font-family="Arial, Helvetica, sans-serif" font-size="24" font-weight="700" fill="#FFFFFF">Durable state and artifacts</text>
  <text x="112" y="640" font-family="Arial, Helvetica, sans-serif" font-size="20" fill="#CBD5E1">Reasoning happens per cycle. Memory lives here.</text>

  <rect x="112" y="674" width="220" height="94" rx="18" fill="#0F172A" stroke="#334155" stroke-width="2"/>
  <text x="144" y="712" font-family="Arial, Helvetica, sans-serif" font-size="20" font-weight="700" fill="#F8FAFC">Canonical SQLite state</text>
  <text x="144" y="742" font-family="Arial, Helvetica, sans-serif" font-size="17" fill="#CBD5E1">postings, contacts, messages, runs</text>

  <rect x="358" y="674" width="220" height="94" rx="18" fill="#0F172A" stroke="#334155" stroke-width="2"/>
  <text x="395" y="712" font-family="Arial, Helvetica, sans-serif" font-size="20" font-weight="700" fill="#F8FAFC">Artifact workspaces</text>
  <text x="395" y="742" font-family="Arial, Helvetica, sans-serif" font-size="17" fill="#CBD5E1">JD files, drafts, search results, reviews</text>

  <rect x="604" y="674" width="244" height="94" rx="18" fill="#0F172A" stroke="#334155" stroke-width="2"/>
  <text x="642" y="712" font-family="Arial, Helvetica, sans-serif" font-size="20" font-weight="700" fill="#F8FAFC">Audit and review surfaces</text>
  <text x="642" y="742" font-family="Arial, Helvetica, sans-serif" font-size="17" fill="#CBD5E1">history, incidents, review packets, logs</text>

  <rect x="910" y="560" width="410" height="248" rx="24" fill="#FFF7ED" stroke="#FED7AA" stroke-width="2"/>
  <text x="942" y="604" font-family="Arial, Helvetica, sans-serif" font-size="24" font-weight="700" fill="#9A3412">Control planes</text>
  <text x="942" y="640" font-family="Arial, Helvetica, sans-serif" font-size="20" fill="#7C2D12">Two loops operate on the same repo with different responsibilities.</text>

  <rect x="942" y="674" width="168" height="94" rx="18" fill="#FFEDD5" stroke="#FDBA74" stroke-width="2"/>
  <text x="974" y="712" font-family="Arial, Helvetica, sans-serif" font-size="20" font-weight="700" fill="#9A3412">Runtime supervisor</text>
  <text x="974" y="742" font-family="Arial, Helvetica, sans-serif" font-size="17" fill="#7C2D12">one bounded work unit</text>

  <rect x="1134" y="674" width="154" height="94" rx="18" fill="#FFEDD5" stroke="#FDBA74" stroke-width="2"/>
  <text x="1163" y="712" font-family="Arial, Helvetica, sans-serif" font-size="20" font-weight="700" fill="#9A3412">Build agent</text>
  <text x="1163" y="742" font-family="Arial, Helvetica, sans-serif" font-size="17" fill="#7C2D12">spec, tests, reports</text>

  <path d="M700 522 V560" stroke="#94A3B8" stroke-width="4" fill="none"/>
  <polygon points="700,560 692,546 708,546" fill="#94A3B8"/>
  <path d="M1115 522 V560" stroke="#94A3B8" stroke-width="4" fill="none"/>
  <polygon points="1115,560 1107,546 1123,546" fill="#94A3B8"/>

  <text x="80" y="848" font-family="Arial, Helvetica, sans-serif" font-size="18" fill="#64748B">See docs/ARCHITECTURE.md for the deeper walkthrough. The README diagram is the high-level map for understanding how the pieces fit together.</text>
</svg>
