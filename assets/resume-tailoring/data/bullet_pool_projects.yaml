      - atom_id: jhc_supervisor_runtime
        what: >-
          Built a Python supervisor runtime with canonical SQLite state,
          lease-guarded heartbeat execution, and bounded progression across
          Gmail intake, resume tailoring, contact discovery, outreach, and
          delivery feedback.
        themes:
          - agent_ai_systems
          - applied_ai
          - forward_deployed_ai
          - backend_service
        tech:
          - Python
          - SQLite
          - Gmail
          - workflow orchestration
          - heartbeats
        metrics: []

      - atom_id: jhc_pipeline_handoffs
        what: >-
          Designed DB-first and artifact-backed workflow contracts so lead
          intake, tailoring, discovery, sending, and feedback can resume
          cleanly with explicit handoff artifacts instead of hidden chat state.
        themes:
          - applied_ai
          - forward_deployed_ai
          - backend_service
          - generalist
        tech:
          - Python
          - SQLite
          - YAML
          - artifact contracts
          - handoff design
        metrics: []

      - atom_id: jhc_contract_audit
        what: >-
