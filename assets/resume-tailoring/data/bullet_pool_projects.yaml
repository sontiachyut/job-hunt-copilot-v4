      - React
      - TypeScript
      - scikit-learn
      - Sentence-BERT
      - FAISS
      - Neo4j
    atoms:
      - atom_id: la_retrieval
        what: >-
          Built an explainable job-search copilot over 31,597 LinkedIn
          postings, combining Sentence-BERT embeddings, FAISS retrieval, and
          Rasch IRT scoring to reach NDCG 0.78 with transparent fit reasoning.
        themes:
          - applied_ai
          - agent_ai_systems
          - backend_service
        tech:
          - Python
          - FastAPI
          - Sentence-BERT
          - FAISS
          - Neo4j
          - Rasch IRT
        metrics:
          - "31,597"
          - "NDCG 0.78"

      - atom_id: la_ranking_pipeline
        what: >-
          Implemented a multi-stage ranking pipeline that compared RapidFuzz,
          TF-IDF, semantic embeddings, and Rasch scoring to expose
          per-requirement match probabilities instead of black-box rankings.
        themes:
          - applied_ai
          - agent_ai_systems
          - backend_service
        tech:
          - RapidFuzz
          - scikit-learn
          - Sentence-BERT
          - FAISS
          - ranking systems
        metrics:
          - "NDCG 0.58"
          - "NDCG 0.62"
          - "NDCG 0.74"
          - "NDCG 0.78"

      - atom_id: la_fullstack
        what: >-
          Delivered a Next.js and React frontend with a FastAPI backend,
          TypeScript UI, and conversational fit-explanation flow over a
          31,597-record job dataset with ~50ms search latency.
        themes:
          - frontend_web
          - fullstack
        tech:
          - Next.js
          - React
          - TypeScript
          - FastAPI
          - Tailwind CSS
        metrics:
          - "31,597"
          - "~50ms"

