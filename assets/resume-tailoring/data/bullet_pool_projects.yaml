        what: >-
          Built an MTCNN-to-InceptionResnetV1 inference pipeline that achieved
          100% accuracy on 100 frames with sub-second latency while keeping edge
          preprocessing under 100ms.
        themes:
          - applied_ai
          - distributed_infra
          - platform_infra
        tech:
          - Python
          - PyTorch
          - MTCNN
          - InceptionResnetV1
          - AWS Lambda
        metrics:
