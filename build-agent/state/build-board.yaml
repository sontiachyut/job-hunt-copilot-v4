          - "Focused downstream regressions now seed real pending-review tailoring state and prove three concrete behaviors: `lead_handoff` advancement into `agent_review`, bounded mandatory-review advancement into `people_search`, and retry-safe resume from `people_search` with the same `pipeline_run_id` plus pending review packet when later downstream stages are still unsupported."
