          - "The latest `build-agent/reports/ba-10-validation-suite-latest.*` snapshot now also records the resolved selector context for mixed `--current-focus` plus `--smoke-target` replays, so downstream-supervisor evidence shows why each validation command was included instead of only listing the executed commands."
