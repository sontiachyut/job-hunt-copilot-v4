current_focus:
  epic_id: BA-01
  slice_id: BA-01-S3
  owner_role: foundation-engineer
  reason: The canonical schema is now landed and validated, so the next dependency is the shared artifact contract envelope plus `artifact_records` helpers every downstream component will need.
  exit_criteria:
    - shared YAML and JSON contract writers can emit the required envelope fields for machine handoff artifacts
    - "`artifact_records` helpers can register artifacts against lead, posting, contact, or message roots"
    - downstream components can reuse canonical path and reference helpers instead of inventing per-component metadata writes

focus_order:
  - epic_id: BA-01
    why_now: The schema, contract, and bootstrap layer is required before any component can publish canonical state or artifacts.
  - epic_id: BA-02
    why_now: Supervisor state semantics depend on the canonical schema but should land before product-side autonomous orchestration grows.
  - epic_id: BA-03
    why_now: Product-side runtime helpers and chat entrypoints depend on both schema and supervisor state.
  - epic_id: BA-04
    why_now: Manual capture is the smallest lead-ingestion path and establishes shared lead workspace conventions.
  - epic_id: BA-05
    why_now: Gmail intake reuses lead materialization conventions and adds autonomous parsing and JD recovery on top.
  - epic_id: BA-06
    why_now: Tailoring depends on canonical postings and must be in place before outreach can begin.
  - epic_id: BA-07
    why_now: Search, enrichment, and discovery depend on approved tailoring state and canonical contact relationships.
  - epic_id: BA-08
    why_now: Drafting and sending should wait until discovery, ready-send-set logic, and pacing rules can be implemented coherently.
  - epic_id: BA-09
    why_now: Feedback and review queries depend on canonical messages, supervisor review packets, and downstream state history.
  - epic_id: BA-10
    why_now: Hardening is most effective after the main component boundaries and artifacts exist.

known_blockers:
  - blocker_id: BUILD-CLI-001
    status: open
    severity: medium
    owner_role: build-lead
    summary: "`codex exec` no longer accepts `--ask-for-approval`, and unattended build-cycle logs show BA-00 sessions failing before work starts when that flag is present."
    evidence:
      - build-agent/logs/cycles/build-cycle-20260406T032821Z-8f48507c.log
      - build-agent/scripts/run_build_lead_cycle.py
    impact: Launchd-driven unattended build sessions should not be trusted until the build-lead CLI invocation is revalidated.
    next_action: Preserve the existing carryover diff in `run_build_lead_cycle.py` and validate it in a dedicated build-lead hygiene slice before relying on unattended execution.
