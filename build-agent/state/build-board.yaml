project: job-hunt-copilot-v4
board_version: 2
last_reset_note: Initial seeded build board created from the finalized PRD and acceptance spec.
last_planning_update: 2026-04-05

global_status:
  current_build_goal: Implement the current-build PRD and acceptance spec in this repository with bounded, validated slices.
  canonical_inputs:
    - prd/spec.md
    - prd/test-spec.feature
  current_phase: implementation_in_progress
  overall_risk: high
  summary:
    - Planning now reflects the PRD and acceptance spec instead of the initial seeded checklist.
    - BA-01-S1 and BA-01-S2 landed the repo-local bootstrap package, canonical SQLite schema migration, review views, and shared record-ID/timestamp helpers.
    - The shared artifact-contract writers and `artifact_records` registration helpers are still open.
  execution_principles:
    - One primary slice per unattended build session.
    - Prefer DB-first state, artifact contracts, and runtime scaffolding before higher-level agent behavior.
    - Reuse shared lead, posting, contact, and artifact primitives across manual and Gmail intake paths.

phases:
  - id: P0
    name: Planning and build-loop readiness
    objective: Replace the seed backlog with a dependency-aware implementation program and keep unattended build execution trustworthy.
    epics:
      - BA-00

  - id: P1
    name: Canonical platform
    objective: Stand up shared runtime scaffolding, canonical schema, supervisor state, and local operator entrypoints.
    epics:
      - BA-01
      - BA-02
      - BA-03

  - id: P2
    name: Lead acquisition
    objective: Materialize manual and Gmail lead intake into canonical lead and posting state.
    epics:
      - BA-04
      - BA-05

  - id: P3
    name: Tailoring and review gate
    objective: Build eligibility, tailoring, finalize, and the mandatory agent review boundary.
    epics:
      - BA-06

  - id: P4
    name: Outreach execution
    objective: Build people search, discovery, drafting, sending, delivery feedback, and queryable review surfaces.
    epics:
      - BA-07
      - BA-08
      - BA-09

  - id: P5
    name: Validation and hardening
    objective: Add acceptance traceability, smoke coverage, and blocker burn-down across the implemented system.
    epics:
      - BA-10

