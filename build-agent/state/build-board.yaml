project: job-hunt-copilot-v4
board_version: 3
last_reset_note: Resume-tailoring branch build program reset from BA-10 closeout to the JD-content-fit redesign backlog.
last_planning_update: 2026-04-15

global_status:
  current_build_goal: "Implement the resume-tailoring JD-content-fit redesign on branch `resume-tailoring` without deleting the legacy tailoring path until the new system passes focused and broad validation."
  canonical_inputs:
    - prd/spec.md
    - prd/test-spec.feature
    - docs/superpowers/plans/2026-04-14-resume-tailoring-jd-fit.md
  current_phase: foundations
  overall_risk: medium
  summary:
    - The builder state has been repointed from the completed BA-10 program to the resume-tailoring redesign program.
    - The Garmin Aviation repro is the confidence check that exposed the problem, but the redesign must work for all JD families, not just Garmin.
    - The redesign is spec-backed on this branch and replaces the old 3-track or 4-focus logic with theme-driven, evidence-pool-based tailoring.
    - Legacy Step 3 through Step 7 code remains in-tree until the new 16-step pipeline is validated end-to-end.
  execution_principles:
    - One primary slice per unattended build session.
    - "Stay on branch `resume-tailoring`; do not switch branches."
    - Treat the branch-local redesign plan as authoritative decomposition for this build program.
    - "Prefer additive implementation under `job_hunt_copilot/tailoring/` before integration cutover."
    - Do not delete or bypass the legacy tailoring path until the new path is green on targeted and broad tests.

phases:
  - id: RT-P1
    name: Static foundations
    objective: Add the new tailoring package, static data files, base templates, and profile updates needed by the redesign.
    epics:
      - RT-01

  - id: RT-P2
    name: Classification and decision core
    objective: Implement JD sectioning, signal extraction, signal classification, theme scoring, and theme selection.
    epics:
      - RT-02

  - id: RT-P3
    name: Evidence selection and content generation
    objective: Implement project scoring, evidence mapping, gap analysis, bullet allocation, summary, skills, and tech-stack composition.
    epics:
      - RT-03

  - id: RT-P4
    name: Assembly and verification
    objective: Assemble one-page resumes with Template A or B and reject JD-content-mismatched outputs.
    epics:
      - RT-04

  - id: RT-P5
    name: Runtime integration
    objective: Wire the new pipeline into the live tailoring runtime without deleting the legacy path early.
    epics:
      - RT-05

  - id: RT-P6
    name: Validation and rollout
    objective: Prove the redesign on the Garmin repro and the broader test suite, then retire the old path only after green validation.
    epics:
      - RT-06

