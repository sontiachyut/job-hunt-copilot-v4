current_focus:
  epic_id: RT-01
  slice_id: RT-01-S1
  owner_role: tailoring-engineer
  reason: The redesign should start by building the stable term-normalization and adjacency foundation that later theme classification, gap analysis, and keyword placement will all reuse.
  exit_criteria:
    - "`job_hunt_copilot/tailoring/` package scaffold exists"
    - "adjacency map and term aliases are persisted under `assets/resume-tailoring/data/`"
    - keyword-system tests exist and pass

focus_order:
  - epic_id: RT-01
    why_now: Static data, package scaffolding, and templates are the hard prerequisites for every later redesign slice.
  - epic_id: RT-02
    why_now: The Garmin failure is primarily a routing and classification problem, so the next highest-value work is deterministic theme selection.
  - epic_id: RT-03
    why_now: Evidence-pool content generation only becomes trustworthy once the classifier and signal weighting are correct.
  - epic_id: RT-04
    why_now: Assembly and verification should be layered on top of stable content generation rather than built first.
  - epic_id: RT-05
    why_now: Runtime integration should happen after the new pipeline exists, not before.
  - epic_id: RT-06
    why_now: Validation and legacy removal belong at the end so the old system remains available until the redesign is proven.

known_blockers: []
